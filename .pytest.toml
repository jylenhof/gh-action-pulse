[pytest]
norecursedirs = [".git", "old", "docs", "dist", "build"]
addopts = [
  "--strict-markers",
  "--strict-config",
  "-ra",
  "-nauto",
  "--cov",
  "--cov-report=lcov:lcov.info",
  "--cov-report=term",
  "--cov-fail-under=80",
]
pythonpath = ["src"]
testpaths = ["tests"]
filterwarnings = []
markers = []
