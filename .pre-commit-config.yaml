---
fail_fast: false
default_install_hook_types:
  - pre-commit
  - commit-msg
repos:
  - repo: https://github.com/commit-check/commit-check
    rev: v2.10.0
    hooks:
      - id: check-message
      - id: check-branch
      - id: check-author-name
      - id: check-author-email
  - repo: builtin
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-symlinks
      - id: detect-private-key
      - id: check-shebang-scripts-are-executable
      - id: check-executables-have-shebangs
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-merge-conflict
  - repo: local
    hooks:
      - id: editorconfig-checker # editorconfig-checker config
        name: editorconfig-checker
        entry: ec
        language: system
        exclude: 'LICENSE'
      - id: rumdl # markdown linter
        name: rumdl
        entry: "rumdl check"
        language: system
        files: '\.md$'
      - id: tombi-format # toml formatter
        name: "tombi format"
        entry: "tombi format"
        language: system
        files: '\.toml$'
      - id: tombi-lint # toml linter
        name: "tombi lint"
        entry: "tombi lint"
        language: system
        files: '\.toml$'
      - id: shfmt # shell formatter
        name: "shfmt"
        entry: "shfmt"
        language: system
        files: '\.(sh|bash)$'
      - id: shellcheck # shell linter
        name: "shellcheck"
        entry: "shellcheck"
        language: system
        files: '\.(sh|bash)$'


      # github actions and workflows
      - id: actionlint
        name: actionlint
        entry: actionlint
        language: system
        files: '\.github/workflows/.*\.(yaml|yml)$'
      - id: pinact
        name: pinact
        entry: "pinact run -u --min-age 7 --verify-comment"
        language: system
        files: '\.github/(workflows/.*|actions/.*/action)\.(yaml|yml)$'
        pass_filenames: false
      - id: ghalint
        name: ghalint
        entry: "ghalint run"
        language: system
        files: '\.github/(workflows/.*|actions/.*/action)\.(yaml|yml)$'
      - id: zizmor
        name: zizmor
        entry: zizmor
        language: system
        files: '(\.github/(workflows/.*|actions/.*/action|dependabot\.ya?ml))|(action\.ya?ml)$'

      # python checks
      - id: "ruff format"
        name: "ruff format"
        entry: "uv run --frozen ruff format"
        language: system
        files: '\.py$'
      - id: "ruff lint"
        name: "ruff lint"
        entry: "uv run --frozen ruff check"
        language: system
        files: '\.py$'
      - id: "pylint"
        name: "pylint"
        entry: "uv run --frozen pylint src tests"
        language: system
        files: '\.py$'
      - id: "pytest"
        name: "pytest"
        entry: "uv run --frozen pytest"
        language: system
        types: [python]
        pass_filenames: false
      - id: "ty"
        name: "ty"
        entry: "uv run --frozen ty check"
        language: system
        files: '\.py$'
