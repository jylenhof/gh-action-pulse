name: Code Checks
on:
  push:
    branches:
      - main
    tags:
      - v*.*.*
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      force_release:
        description: Force release
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  prek-checks:
    name: Prek Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      UV_LINK_MODE: copy
    permissions:
      contents: read
    steps:
      - name: "Cleaning up"
        uses: gacts/run-and-post-run@598d7a875d5620e0457490555b5e18e46082aa47 # v1.4.4
        with:
          run: |
            echo "Pre-Check Cleanup"
            echo "~/.local" | xargs rm -rf
          post: |
            echo "Post-Check Cleanup"
            echo "~/.local" | xargs rm -rf

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        env:
          MISE_INSTALL_FROM_GITHUB: 1
        with:
          cache: false
          version: ${{ vars.MISE_VERSION }}

      - name: Run prek checks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: prek run --all-files --show-diff-on-failure

  build:
    name: Build Python 🐍 distribution 📦
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      UV_LINK_MODE: copy
    permissions:
      contents: read
    needs:
    - prek-checks
    steps:
      - name: "Cleaning up"
        uses: gacts/run-and-post-run@598d7a875d5620e0457490555b5e18e46082aa47 # v1.4.4
        with:
          run: |
            echo "Pre-Check Cleanup"
            echo "~/.local" | xargs rm -rf
          post: |
            echo "Post-Check Cleanup"
            echo "~/.local" | xargs rm -rf

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        env:
          MISE_INSTALL_FROM_GITHUB: 1
        with:
          cache: false
          version: ${{ vars.MISE_VERSION }}

      - name: Build wheel distribution file
        run: |
          uv build --wheel

      - name: Store the distribution packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: startsWith(github.ref, 'refs/tags') || inputs.force_release == true
        with:
          name: python-package-distributions
          path: dist/


  publish-to-pypi:
    name: Publish Python 🐍 distribution 📦 to PyPI
    # only publish to PyPI on tag pushes
    if: |
      (startsWith(github.ref, 'refs/tags/') || inputs.force_release == true) &&
      (vars.ENVIRONMENT == 'pypi' || vars.ENVIRONMENT == '')
    needs:
    - build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: pypi
      url: https://pypi.org/p/gh-action-pulse
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing
    steps:

    - name: Download all the dists
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: python-package-distributions
        path: dist/

    - name: Publish distribution 📦 to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  publish-to-testpypi:
    name: Publish Python 🐍 distribution 📦 to TestPyPI
    # only publish to TestPyPI on tag pushes
    if: ${{ (startsWith(github.ref, 'refs/tags/') || inputs.force_release == true) && vars.ENVIRONMENT == 'testpypi' }}
    needs:
    - build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: testpypi
      url: https://test.pypi.org/p/gh-action-pulse
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: python-package-distributions
        path: dist/
    - name: Publish distribution 📦 to TestPyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
      with:
        repository-url: https://test.pypi.org/legacy/
